name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**" # Only deploy when backend files change
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    name: Deploy Django Backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/github-actions
          chmod 600 ~/.ssh/github-actions
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/github-actions ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            
            echo "📦 Navigating to backend directory..."
            cd ~/arc-raiders-helper/backend
            
            echo "🔄 Pulling latest changes..."
            git pull origin main
            
            echo "🛑 Stopping containers..."
            docker-compose -f compose.prod.yaml down
            
            echo "🏗️ Building new Docker image..."
            docker-compose -f compose.prod.yaml build --no-cache
            
            echo "🚀 Starting containers..."
            docker-compose -f compose.prod.yaml up -d
            
            echo "⏳ Waiting for containers to be healthy..."
            sleep 10
            
            echo "📊 Checking container status..."
            docker-compose -f compose.prod.yaml ps
            
            echo "📝 Showing recent logs..."
            docker-compose -f compose.prod.yaml logs --tail=50
            
            echo "✅ Deployment completed successfully!"
          EOF
      - name: Fill Data
        run: |
          docker-compose -f compose.prod.yaml exec -T web python manage.py get_events_schedule

      - name: Verify Deployment
        run: |
          echo "🧪 Testing API endpoint..."
          sleep 5
          curl -f http://${{ secrets.EC2_HOST }}:8000/api/conditions_by_map/ || exit 1
          echo "✅ API is responding correctly!"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/github-actions
