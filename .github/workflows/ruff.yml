name: Ruff Lint and Format
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          # 'check' runs the linter (default behavior if 'args' is omitted)
          args: "check"

      - name: Run Ruff Format Check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff" # Checks if files are formatted, shows diff if not
